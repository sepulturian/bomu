{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto 0;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 2.6rem;">Bomu</h1>
        <p style="color: var(--ink-dim);">your personal bartender</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required
                   autocapitalize="none" autocorrect="off" autocomplete="username"
                   value="{{ username or '' }}">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required
                   autocomplete="current-password"
                   style="width: 100%; padding: 0.7rem 1rem; background: rgba(0,0,0,0.25); border: 1px solid var(--card-border); border-radius: 999px; color: var(--ink); font-family: var(--font-body); font-size: 1rem;">
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Log in</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; color: var(--ink-dim);">
        New here? <a href="{{ url_for('signup') }}" style="color: var(--coral);">Sign up with your invite code</a>
    </p>
</div>
{% endblock %}
