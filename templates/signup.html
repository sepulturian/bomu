{% extends "base.html" %}
{% block content %}
<div style="max-width: 400px; margin: 2rem auto 0;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 style="font-size: 2.6rem;">Join Bomu</h1>
        <p style="color: var(--ink-dim);">your bar, your drinks, your terrible ratings</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="invite">Invite code</label>
            <input type="text" id="invite" name="invite" required
                   autocapitalize="none" autocorrect="off"
                   placeholder="ask Aaron">
        </div>
        <div class="form-group">
            <label for="username">Pick a username</label>
            <input type="text" id="username" name="username" required
                   autocapitalize="none" autocorrect="off" autocomplete="username"
                   value="{{ username or '' }}">
        </div>
        <div class="form-group">
            <label for="password">Password (8+ characters)</label>
            <input type="password" id="password" name="password" required minlength="8"
                   autocomplete="new-password"
                   style="width: 100%; padding: 0.7rem 1rem; background: rgba(0,0,0,0.25); border: 1px solid var(--card-border); border-radius: 999px; color: var(--ink); font-family: var(--font-body); font-size: 1rem;">
        </div>
        <div class="form-group">
            <label for="confirm">Same password again</label>
            <input type="password" id="confirm" name="confirm" required minlength="8"
                   autocomplete="new-password"
                   style="width: 100%; padding: 0.7rem 1rem; background: rgba(0,0,0,0.25); border: 1px solid var(--card-border); border-radius: 999px; color: var(--ink); font-family: var(--font-body); font-size: 1rem;">
        </div>
        <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Create account</button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; color: var(--ink-dim);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--coral);">Log in</a>
    </p>
</div>
{% endblock %}
