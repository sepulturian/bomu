{% extends "base.html" %}

{% block content %}
<h1>Scan a Bottle</h1>
<p style="color: #8888aa; margin-bottom: 1.5rem;">Take a photo of a single bottle and Claude will read the label.</p>

<form method="POST" enctype="multipart/form-data">
    <div class="form-group">
        <label for="photo">Choose or take a photo</label>
        <input type="file" id="photo" name="photo" accept="image/*" capture="environment"
               style="width: 100%; padding: 0.6rem; background: #16213e; border: 1px solid #333; border-radius: 6px; color: #e0e0e0;">
    </div>
    <button type="submit" class="btn">Scan Bottle</button>
</form>

<p style="color: #666; margin-top: 2rem; font-size: 0.85rem;">Tip: Get a clear shot of the label. Good lighting helps.</p>
{% endblock %}
