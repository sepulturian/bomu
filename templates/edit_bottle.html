{% extends "base.html" %}

{% block content %}
<h1>Edit Bottle</h1>

<form method="POST">
    <div class="form-group">
        <label for="name">Bottle Name</label>
        <input type="text" id="name" name="name" value="{{ bottle.name }}" required>
    </div>

    <div class="form-group">
        <label for="type">Type</label>
        <select id="type" name="type" required>
            <option value="">Pick a type...</option>
            {% for t in ['gin', 'vodka', 'rum', 'tequila', 'mezcal', 'whiskey', 'bourbon', 'scotch', 'brandy', 'cognac', 'vermouth', 'amaro', 'liqueur', 'other'] %}
                <option value="{{ t }}" {% if bottle.type == t %}selected{% endif %}>{{ t|capitalize }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="form-group">
        <label for="brand">Brand (optional)</label>
        <input type="text" id="brand" name="brand" value="{{ bottle.brand or '' }}">
    </div>

    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn">Save Changes</button>
        <a href="/bar" class="btn btn-secondary">Cancel</a>
    </div>
</form>
{% endblock %}
